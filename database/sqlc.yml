version: "2"
sql:
  - engine: "postgresql"
    schema: "./migrations"
    queries: "./queries"
    gen:
      go:
        package: "db"
        out: "../internal/db"
        emit_interface: true
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "text"
            nullable: true
            go_type: { type: "string", pointer: true }
          - db_type: "varchar"
            nullable: true
            go_type: { type: "string", pointer: true }
          - db_type: "date"
            nullable: true
            go_type: { import: "time", type: "Time", pointer: true }
          - db_type: "timestamp"
            nullable: true
            go_type: { import: "time", type: "Time", pointer: true }
          - db_type: "timestamptz"
            nullable: true
            go_type: { import: "time", type: "Time", pointer: true }
          - db_type: "int4"
            nullable: true
            go_type: { type: "int32", pointer: true }
          - db_type: "int8"
            nullable: true
            go_type: { type: "int64", pointer: true }
          - db_type: "bool"
            nullable: true
            go_type: { type: "bool", pointer: true }
