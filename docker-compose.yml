name: pitch-on-db

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: on-failure
    depends_on: [ postgres ]
    environment:
      APP_ENV: ${APP_ENV:-development}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-pitchondb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pitchondb}
      POSTGRES_DB: ${POSTGRES_DB:-pitchondb}
      POSTGRES_SSLMODE: ${POSTGRES_SSLMODE:-disable}
    expose: [ 8080 ]

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: runner
    restart: on-failure
    depends_on: [ api ]
    ports: [ 80:80 ]

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pitchondb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pitchondb}
      POSTGRES_DB: ${POSTGRES_DB:-pitchondb}
    ports: [ "${POSTGRES_PORT:-5432}:5432" ]
    volumes: [ pgdata:/var/lib/postgresql/data ]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pitchondb}"]
      interval: 5s
      retries: 5

volumes:
  pgdata:
