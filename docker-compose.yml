name: pitch-on-db

services:
  api:
    build: .
    container_name: api
    restart: on-failure
    depends_on: [ postgres ]
    environment:
      APP_ENV: ${APP_ENV:-development}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-pitchondb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pitchondb}
      POSTGRES_DB: ${POSTGRES_DB:-pitchondb}
      POSTGRES_SSLMODE: ${POSTGRES_SSLMODE:-disable}
    ports: [ 8080:8080 ]

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pitchondb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pitchondb}
      POSTGRES_DB: ${POSTGRES_DB:-pitchondb}
    ports: [ "${POSTGRES_PORT:-5432}:5432" ]
    volumes: [ pgdata:/var/lib/postgresql/data ]

volumes:
  pgdata:
